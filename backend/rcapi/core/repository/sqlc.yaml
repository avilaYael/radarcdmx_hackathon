version: "2"
sql:
  - engine: "mysql"
    schema: "sql/schema/create.sql"
    queries: "sql/queries/"
    gen:
      go:
        emit_exact_table_names: true
        package: "rcapidb"
        out: "gen"
        emit_interface: true
        emit_json_tags: true
        rename: 
          calle: Calle
          clave_catastral: ClaveCatastral
          clee: Clee
          codigo_actividad: CodigoActividad
          codigo_postal: CodigoPostal
          contacto: Contacto
          correo: Correo
          created_at: CreatedAt
          created_by: CreatedBy
          email: Email
          entidad: Entidad
          fecha_alta: FechaAlta
          id_denue: IdDenue
          lastname: Lastname
          latitud: Latitud
          localidad: Localidad
          longitud: Longitud
          manzana: Manzana
          municipio: Municipio
          name: Name
          nombre: Nombre
          nombre_actividad: NombreActividad
          num_ext: NumExt
          num_int: NumInt
          password: Password
          per_ocu: PerOcu
          razon_social: RazonSocial
          sitio_web: SitioWeb
          status: Status
          telefono: Telefono
          ubicacion: Ubicacion
          updated_at: UpdatedAt
          updated_by: UpdatedBy
          uso_de_suelo: UsoDeSuelo
          uuid: UUID        
        overrides:          
          - db_type: "int"            
            go_type:              
              type: "int64"
          - db_type: "json"            
            go_type:
              type: "[]byte"  # workaround sqlc bug when reading null json columns            
          - db_type: "json"  
            nullable: true            
            go_type:
              type: "[]byte"  # workaround sqlc bug when reading null json columns            
          - db_type: datetime
            nullable: true            
            go_type:
              import: "github.com/guregu/null/v6"
              package: "null"
              type: "Time"
          - db_type: date
            nullable: true            
            go_type:
              import: "github.com/guregu/null/v6"
              package: "null"
              type: "Time"
          - db_type: time
            nullable: true            
            go_type:
              import: "github.com/guregu/null/v6"
              package: "null"
              type: "Time"
          - db_type: varchar
            nullable: true            
            go_type:
              import: "github.com/guregu/null/v6"
              package: "null"
              type: "String"
          - db_type: char
            nullable: true            
            go_type:
              import: "github.com/guregu/null/v6"
              package: "null"
              type: "String"
          - db_type: text
            nullable: true            
            go_type:
              import: "github.com/guregu/null/v6"
              package: "null"
              type: "String"
          - db_type: "int"
            nullable: true            
            go_type:
              import: "github.com/guregu/null/v6"
              package: "null"
              type: "Int"
          - db_type: float
            nullable: true            
            go_type:
              import: "github.com/guregu/null/v6"
              package: "null"
              type: "Float"
          - db_type: double
            nullable: true            
            go_type:
              import: "github.com/guregu/null/v6"
              package: "null"
              type: "Float"
          - db_type: double
            nullable: true            
            go_type:
              import: "github.com/guregu/null/v6"
              package: "null"
              type: "Float"
          - db_type: tinyint
            nullable: true            
            go_type:
              import: "github.com/guregu/null/v6"
              package: "null"
              type: "Bool"
overrides:
  go: 
    rename:
      contacto: Contacto
      establecimiento: Establecimiento
      ubicacion: Ubicacion
      user: User