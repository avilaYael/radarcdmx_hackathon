apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "rcapi.fullname" . }}-test-connection"
  labels:
    {{- include "rcapi.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: grpc-check
      image: busybox
      command: ['nc', '-z', '-w', '3']
      args: ['{{ include "rcapi.fullname" . }}', '{{ .Values.service.grpcPort }}']
  restartPolicy: Never
