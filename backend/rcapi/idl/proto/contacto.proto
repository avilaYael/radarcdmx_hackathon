syntax = "proto3";

option go_package = "rcapi/idl/gen";
option java_multiple_files = true;
option java_package = "github.com/mklfarha/radarcdmx/backend/rcapi";
option java_outer_classname = "Contacto";

package rcapi;



message Contacto {  
    string telefono = 1;
    string correo = 2;
    string sitio_web = 3;    
}
